version: "3.8"
services:
  mysql:
    image: mysql:5.7
    container_name: demo-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ms_account_dev
      TZ: Asia/Shanghai
    ports:
      - "3307:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_general_ci

  redis:
    image: redis:7
    container_name: demo-redis
    restart: unless-stopped
    ports:
      - "6379:6379"